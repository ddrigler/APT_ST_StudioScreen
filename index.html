<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>APT ST Studio Screen</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  cursor: none !important;
}

#stage {
  position: fixed;
  inset: 0;
}

#stage img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
</style>
</head>
<body>
<div id="stage"></div>

<script src="app.js"></script>

<script>
const REFRESH_INTERVAL = 30 * 60 * 1000;

setTimeout(() => {
  window.location.reload();
}, REFRESH_INTERVAL);

setTimeout(() => {
  const stage = document.getElementById("stage");
  if (!stage || stage.children.length === 0) {
    window.location.reload();
  }
}, 10000);

document.addEventListener("mousemove", () => {
  document.body.style.cursor = "none";
});
</script>
</body>
</html>
